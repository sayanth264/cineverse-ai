<!DOCTYPE html>
<html>

<head>
<title>Create Account</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="loginbox">

<h2>Create Account</h2>

<input id="newuser" placeholder="Username">
<input id="newpass" type="password" placeholder="Password">

<button onclick="signup()">Create Account</button>

<p id="msg"></p>

<p><a href="login.html">Already have account? Login</a></p>

</div>

<script>

function signup(){

let username=document.getElementById("newuser").value
let password=document.getElementById("newpass").value

if(username=="" || password==""){
document.getElementById("msg").innerHTML="Enter username and password"
return
}

localStorage.setItem(username,password)

document.getElementById("msg").innerHTML="Account created! Now login."

}

</script>

</body>
</html>
